name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: Run tests
        env:
          DEVSECOPS_ENABLE_LLM: "false"
        run: pytest tests/ -v --cov=devsecops --cov-report=term-missing

      - name: Lint with ruff
        run: ruff check src/ tests/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DevSecOps Guardian
        run: pip install -e .

      - name: Initialize config
        run: devsecops config --init

      - name: Self-scan (no LLM)
        env:
          DEVSECOPS_ENABLE_LLM: "false"
        run: devsecops scan --no-llm || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devsecops-guardian:latest .

      - name: Verify Docker image
        run: docker run --rm devsecops-guardian:latest --version
